<!-- Appreciators Mock Mint iframe embed -->
<!-- Replace https://YOUR-BACKEND-URL with the public URL that serves mock-mint-simulator.html. -->
<div id="appreciators-mint-embed" style="width:100%;max-width:960px;margin:0 auto;">
  <iframe
    id="appreciators-mint-frame"
    title="Appreciators Mock Mint Simulator"
    src="https://YOUR-BACKEND-URL/mock-mint-simulator.html?apiBase=https%3A%2F%2FYOUR-BACKEND-URL"
    loading="lazy"
    style="display:block;width:100%;height:720px;border:0;border-radius:8px;overflow:hidden;background:#080b16;"
  ></iframe>
</div>

<script>
  (() => {
    const frame = document.getElementById("appreciators-mint-frame");
    if (!frame) return;

    const allowedOrigin = new URL(frame.src).origin;
    window.addEventListener("message", (event) => {
      if (event.origin !== allowedOrigin) return;
      if (!event.data || event.data.type !== "appreciators-mint-height") return;

      const height = Number(event.data.height);
      if (!Number.isFinite(height)) return;

      frame.style.height = Math.min(Math.max(height, 560), 1200) + "px";
    });
  })();
</script>
