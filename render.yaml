services:
  - type: web
    name: appreciators-tcg-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: INVITE_ROOM_PERSISTENCE
        value: "true"
      - key: INVITE_ROOM_STORE_PATH
        value: /tmp/appreciators-invite-rooms.json
      - key: INVITE_ROOM_TTL_MINUTES
        value: "360"
